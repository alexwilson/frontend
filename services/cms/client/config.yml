# YAML variables
# Nested in one block so they can be removed at run-time.
__constants:
  time_format: &time_format "YYYY-MM-DDTHH:mm:ssZ"

backend:
  name: github-app
  repo: alexwilson/content
  branch: main
  use_graphql: true
  cms_label_prefix: status/

# We serialize this to JavaScript on deploys instead of dynamically fetching.
load_config_file: false

publish_mode: editorial_workflow

media_folder: pictures

display_url: https://alexwilson.tech/

i18n:
  structure: single_file
  locales: ["en", "ja"]
  default_locale: en

collections:
  - name: "content"
    label: "Content"
    folder: "/posts/"
    create: true
    slug: "{{id}}"
    fields: &contentFields
      - {label: ID, name: id, required: true, widget: "uuid"}
      - {label: Title, name: "title", required: true, widget: "string"}
      - {label: Published Date, name: "date", required: true, format: *time_format, widget: "datetime", default: "{{now}}"}
      - {label: Image, name: "image", required: false, widget: "image"}
      - {label: Tags, name: "tags", allow_add: true, label_singular: "Add", widget: "list"}
      - {label: Body, name: "body", widget: "markdown"}
      - {label: Content Type, name: "type", options: ["article", "talk", "content-placeholder"], default: "article", widget: "select"}
      - {label: "Link", name: "link", required: false, widget: "string"}
      - {label: "Author(s)", name: "author", widget: "select", options: ["alex"], default: "alex"}
      - {label: Updated Date, name: "last_modified_at", default: "", format: *time_format, required: false, widget: "datetime"}

  - name: "pages"
    label: "Pages"
    folder: "/pages/"
    create: true
    identifier_field: path
    slug: "{{fields.path}}"
    summary: "{{fields.title}} ({{fields.path}})"
    fields:
      - {label: ID, name: id, required: true, widget: "uuid"}
      - {label: Title, name: "title", required: true, widget: "string"}
      - {label: Path, name: "path", required: true, widget: "string", hint: "URL path, no leading slash, e.g. about-me — also the filename"}
      - {label: Layout, name: "layout", widget: "select", default: "full", options: ["full", "article"], hint: "full = full-width; article = content column with a recent-writing rail"}
      - {label: Description, name: "description", required: false, widget: "text", hint: "SEO/social description; falls back to an excerpt of the body"}
      - {label: Keywords, name: "keywords", required: false, widget: "list", label_singular: "Keyword"}
      - {label: Body, name: "body", required: true, widget: "markdown"}
