[settings]
env_file = ".env"
idiomatic_version_file_enable_tools = ["node", "python", "terraform"]

[tools]
jq     = "1.7.1"
pnpm   = "10.23.0"

[tasks."projects:list"]
description = "List monorepo projects, optionally narrowed. Args: [--json] [--since <ref>] [--filter <expr>]..."
run = "./tools/projects_list.py"

[tasks."projects:graph"]
description = "Show first-order project dependencies. Args: [--format tree|dot]"
run = "./tools/projects_graph.py"

[tasks."projects:lint"]
description = "Lint project structure (required files per kind). Exits non-zero on issues. Args: [--json]"
run = "./tools/projects_lint.py"

[tasks."test:tools"]
description = "Run the stdlib unittest suite for tools/."
run = "python -m unittest discover -s tools/tests -t tools -p 'test_*.py'"

