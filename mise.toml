[settings]
env_file = ".env"
idiomatic_version_file_enable_tools = ["node", "terraform"]

[tools]
jq         = "1.7.1"
pnpm       = "10.23.0"
shellcheck = "0.11.0"

[tasks."util:list"]
description = "List workspace projects, optionally narrowed to those affected since a base git ref. Args: [--json] [base-ref]"
run = "./scripts/list-projects.sh"

[tasks."lint:shell"]
description = "Run shellcheck against repo shell scripts."
run = "shellcheck scripts/*.sh"

