name: 'Validate feed'
description: 'Validate an Atom/RSS feed using a vendored W3C feedvalidator.'

inputs:
  feed:
    description: 'Path or URL of the feed to validate.'
    required: true
  origin-url:
    description: >
      Local-file mode only. When set, the validator treats the feed as if
      loaded from this URL, so the origin/self-link checks pass for an
      artefact that has not been deployed yet. Ignored when `feed` is a URL.
    required: false
    default: ''
  python-version:
    description: 'Python version to install for running the validator.'
    required: false
    default: '3.x'
  fail-on:
    description: >
      When to fail the step: `errors` (default; any validator error),
      `warnings` (any warning or error), or `never` (run for reporting only).
    required: false
    default: errors
  compatibility:
    description: >
      Validator strictness: `A` (loosest), `AA` (default; mimics the online
      validator), or `AAA` (experimental, rules may change between upstream
      versions).
    required: false
    default: AA

outputs:
  errors:
    description: 'Number of errors reported by the validator.'
    value: ${{ steps.validate.outputs.errors }}
  warnings:
    description: 'Number of warnings reported by the validator.'
    value: ${{ steps.validate.outputs.warnings }}
  issues:
    description: 'Total number of issues (errors + warnings + info).'
    value: ${{ steps.validate.outputs.issues }}
  report-path:
    description: 'Path to the captured validator report (text file).'
    value: ${{ steps.validate.outputs.report-path }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install vendored feedvalidator dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/vendor/feedvalidator
      env:
        PIP_DISABLE_PIP_VERSION_CHECK: '1'
      run: |
        echo "::group::pip install"
        pip install -q -r requirements.txt
        echo "::endgroup::"
    - name: Validate feed
      id: validate
      shell: bash
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        COMPATIBILITY: ${{ inputs.compatibility }}
        ORIGIN_URL: ${{ inputs.origin-url }}
        PYTHONPATH: ${{ github.action_path }}/vendor/feedvalidator/src
      run: python "${{ github.action_path }}/entrypoint.py" "${{ inputs.feed }}"
