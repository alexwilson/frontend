version: 2

updates:
  # Bump vendor/feedvalidator to track upstream w3c/feedvalidator main.
  # `fix:` prefix so Release Please treats each bump as a patch release.
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: fix
      include: scope

  # Keep our own workflow action pins fresh.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
