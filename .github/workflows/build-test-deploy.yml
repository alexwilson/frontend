name: Build, Test and Deploy Gatsby
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Scheduled build so pipeline failures are noticed quicker.
    - cron: "30 4 * * 3,6"
  repository_dispatch:
    types:
      - content-update

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fetch dependencies and build Gatsby
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref != 'refs/heads/gh-pages'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Restore Cached Build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-public
        with:
          path: |
            services/personal-website/public
            services/personal-website/.cache
          key: build-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            build-
      - uses: ./.github/actions/setup-monorepo
        with:
          install-filter: '@alexwilson/personal-website...'
      - name: Build
        run: pnpx lerna run --scope @alexwilson/personal-website build
        env:
          GITHUB_TOKEN: ${{ secrets.CONTENT_ACCESS_TOKEN }}
          CI: true
      - name: Save Build Artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site-artefact
          path: services/personal-website/public

  # Run unit tests on the artefact we just built.
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    steps:
      - name: Check if Build succeeded
        if: needs.build.result != 'success'
        run: |
          echo "Build failed."
          exit 1
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-monorepo
        with:
          install-filter: '@alexwilson/personal-website...'
      - name: Typecheck
        run: pnpx lerna run --scope @alexwilson/personal-website typecheck
      - name: Run Tests
        run: pnpx lerna run --scope @alexwilson/personal-website test

  validate-feed:
    name: "Validate feed"
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: always()
    steps:
      - name: Check if Build succeeded
        if: needs.build.result != 'success'
        run: |
          echo "Build failed."
          exit 1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: w3c/feedvalidator
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.7"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download Website Artefact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: site-artefact
          path: public
      - name: "Update feed location for local testing"
        run: |
          # Replace references to feed IRI with feedvalidator.org which W3C validator uses as a mock origin.
          sed -i 's|https://alexwilson.tech/feed.xml|http://www.feedvalidator.org/public/feed.xml|g' public/feed.xml
      - name: "Validate Artefacted Feed"
        run: |
          python src/demo.py public/feed.xml

  # Deploy to Github Pages environment
  deploy-ghpages:
    name: Deploy Gatsby to Github Pages
    needs: [test, validate-feed]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Download Website Artefact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: site-artefact
          path: public
      - name: Deploy to Github Pages
        uses: ./.github/actions/github-pages/
        env:
          GITHUB_TOKEN: ${{ secrets.PAGES_GH_TOKEN }}
        with:
          args: public
