name: Build, Test and Deploy Gatsby
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Scheduled build so pipeline failures are noticed quicker.
    - cron: "30 4 * * 3,6"
  repository_dispatch:
    types:
      - content-update

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fetch dependencies and build Gatsby
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref != 'refs/heads/gh-pages'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Restore Cached Build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-public
        with:
          path: |
            services/personal-website/public
            services/personal-website/.cache
          key: build-v2-${{ hashFiles('pnpm-lock.yaml', 'services/personal-website/gatsby-config.ts', 'services/personal-website/gatsby-node.ts') }}
          restore-keys: |
            build-v2-
      - uses: ./.github/actions/setup-monorepo
        with:
          install-filter: '@alexwilson/personal-website...'
      - name: Build
        run: pnpm --filter @alexwilson/personal-website run build
        env:
          GITHUB_TOKEN: ${{ secrets.CONTENT_ACCESS_TOKEN }}
          CI: true
      - name: Save Build Artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site-artefact
          path: services/personal-website/public

  # Run unit tests on the artefact we just built.
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    steps:
      - name: Check if Build succeeded
        if: needs.build.result != 'success'
        run: |
          echo "Build failed."
          exit 1
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-monorepo
        with:
          install-filter: '@alexwilson/personal-website...'
      - name: Typecheck
        run: pnpm --filter @alexwilson/personal-website run typecheck
      - name: Run Tests
        run: pnpm --filter @alexwilson/personal-website run test

  validate-feed:
    name: "Validate feed"
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: always()
    steps:
      - name: Check if Build succeeded
        if: needs.build.result != 'success'
        run: |
          echo "Build failed."
          exit 1
      - name: Download Website Artefact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site-artefact
          path: public
      - uses: alexwilson/feed-validator-action@20c1fc2adb3820699d789855f346bc2e61fcffd8 # v1.1.0
        with:
          feed: public/feed.xml
          origin-url: https://alexwilson.tech/feed.xml
          compatibility: AAA
          fail-on: warning

  # Deploy to Github Pages environment
  deploy-ghpages:
    name: Deploy Gatsby to Github Pages
    needs: [test, validate-feed]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Download Website Artefact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site-artefact
          path: public
      - name: Deploy to Github Pages
        uses: ./.github/actions/github-pages/
        env:
          GITHUB_TOKEN: ${{ secrets.PAGES_GH_TOKEN }}
        with:
          args: public
