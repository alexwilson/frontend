name: Terraform Deployments

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: "Lint Terraform"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get Terraform Version
        id: tf_version
        run: echo "value=$(cat .terraform-version)" >> $GITHUB_OUTPUT
        working-directory: .
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.tf_version.outputs.value }}
      - name: Lint Terraform
        run: terraform fmt -check

  lint-test-vcl:
    name: "Lint & Test VCL"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./terraform/modules/fastly/vcl
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@8eb7f2efa6ab636da09aef605b497fd5b8a7587d # main
      - name: Install Falco
        run: brew install falco
      - name: Lint VCL
        run: falco lint -vv -I . main.vcl
      - name: Test VCL
        run: falco test -vv -I . main.vcl

  plan-prod:
    name: "Plan (prod) — preview only"
    if: github.event_name == 'pull_request'
    needs: [lint, lint-test-vcl]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    env:
      FASTLY_API_KEY: ${{ secrets.TERRAFORM_FASTLY_API_KEY }}
      TF_WORKSPACE: "prod"
      TF_LOG: "warn"
      TF_IN_AUTOMATION: "1"

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get Terraform Version
        id: tf_version
        run: echo "value=$(cat .terraform-version)" >> $GITHUB_OUTPUT
        working-directory: .
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.tf_version.outputs.value }}
          cli_config_credentials_token: ${{ secrets.TERRAFORM_API_TOKEN }}

      - run: terraform init

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -input=false -var-file=environments/prod.tfvars
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const marker = '<!-- terraform-plan-prod -->';
            const max = 60000;
            let plan = process.env.PLAN_STDOUT || '(no output)';
            if (plan.length > max) plan = plan.slice(0, max) + '\n…(truncated)…\n';
            const status = process.env.PLAN_OUTCOME === 'success' ? '✅' : '❌';
            const body = `${marker}\n### ${status} Terraform plan (\`prod\`)\n\n<details><summary>Show plan</summary>\n\n\`\`\`terraform\n${plan}\n\`\`\`\n\n</details>`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  deploy-to-test:
    needs: [lint, lint-test-vcl]
    concurrency:
      group: ${{ github.workflow }}-test
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FASTLY_API_KEY: ${{ secrets.TERRAFORM_FASTLY_API_KEY }}
      TF_WORKSPACE: "test"
      TF_LOG: "warn"

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get Terraform Version
        id: tf_version
        run: echo "value=$(cat .terraform-version)" >> $GITHUB_OUTPUT
        working-directory: .
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.tf_version.outputs.value }}
          cli_config_credentials_token: ${{ secrets.TERRAFORM_API_TOKEN }}

      - name: Set-up test workspace
        run: |
          terraform init

      - name: Apply test configuration
        run: terraform apply -auto-approve -var-file=environments/test.tfvars

      - name: Run tests against test
        run: |
          echo "Imagine these are real tests"

  deploy-to-prod:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    concurrency:
      group: ${{ github.workflow }}-prod
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: deploy-to-test

    env:
      FASTLY_API_KEY: ${{ secrets.TERRAFORM_FASTLY_API_KEY }}
      TF_WORKSPACE: "prod"
      TF_LOG: "warn"

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get Terraform Version
        id: tf_version
        run: echo "value=$(cat .terraform-version)" >> $GITHUB_OUTPUT
        working-directory: .
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.tf_version.outputs.value }}
          cli_config_credentials_token: ${{ secrets.TERRAFORM_API_TOKEN }}

      - name: Set-up prod workspace
        run: |
          terraform init

      - name: Apply prod configuration
        run: terraform apply -auto-approve -var-file=environments/prod.tfvars

      - name: Run tests against prod
        run: |
          echo "Imagine these are real tests"
