name: Monorepo Deploy Pipeline
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Scheduled build so pipeline failures are noticed quicker.
    - cron: "30 4 * * 1,3,5,0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prepare:
    name: "Prepare (Find Projects, Warm dependency caches)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Don't let `mise run` auto-install tools beyond what install_args asked for.
      MISE_TASK_RUN_AUTO_INSTALL: "false"
    outputs:
      projects: ${{ steps.find-projects.outputs.projects }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Fetch base ref for diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git fetch --depth=1 origin "$BASE_SHA"
          fi
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install_args: python pnpm
          cache_key_prefix: mise-monorepo-prepare
      - uses: ./.github/actions/setup-monorepo
        with:
          install-filter: '!@alexwilson/personal-website'
      - id: find-projects
        name: Find affected projects
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          args=(--json)
          # Narrowing to packages changed since the base ref + their dependents
          # is handled by projects:list when --since is passed. Empty / zero-SHA
          # base ref (schedule, dispatch) or a no-change narrow both fall back
          # to "all packages" inside the tool — see tools/projects_list.py and
          # its tests for the exact semantics.
          if [ -n "$BASE_REF" ] && [ "$BASE_REF" != "0000000000000000000000000000000000000000" ]; then
            args+=(--since "$BASE_REF")
          fi

          echo "Event: $GITHUB_EVENT_NAME"
          echo "Base ref: ${BASE_REF:-<none>}"
          echo "$ mise run projects:list -- ${args[*]}"

          # Personal-website is handled by build-test-deploy.yml separately.
          projects=$(mise run --quiet projects:list -- "${args[@]}" \
            | jq -c '{include: map(select(.name != "@alexwilson/personal-website"))}')

          echo "Matrix:"
          echo "$projects" | jq .
          echo "projects=$projects" >> "$GITHUB_OUTPUT"

  # Fetch dependencies and build Gatsby
  test:
    needs: [prepare]
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: ${{ secrets.NODE_ENV }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.projects) }}
    if: always()
    steps:
      - name: Fail explicitly if Prepare failed
        if: needs.prepare.result != 'success'
        run: |
          echo "Prepare failed."
          exit 1
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-monorepo
        with:
          install-filter: '!@alexwilson/personal-website'
      - name: Typecheck
        run: pnpm --filter ${{ matrix.name }} run typecheck
      - name: Test
        run: pnpm --filter ${{ matrix.name }} run test

  tests-passed:
    name: Tests Passed
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Explicit fail if Test job failed
        if: needs.test.result != 'success'
        run: |
          echo "Tests failed."
          exit 1
      - run: echo "👍"

  chromatic:
    name: Publish to Chromatic
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    if: always() && needs.prepare.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-monorepo
        with:
          install-filter: '!@alexwilson/personal-website'
      - name: Publish to Chromatic
        run: pnpm --filter @alexwilson/storybook exec chromatic --exit-zero-on-changes
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

  deploy:
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.projects) }}
    name: Deploy ${{ matrix.name }}
    needs: [prepare, tests-passed]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    env:
      NODE_ENV: ${{ secrets.NODE_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-monorepo
        with:
          install-filter: '!@alexwilson/personal-website'
      - name: Deploy
        run: pnpm --filter ${{ matrix.name }} run deploy
        env:
          CI: true
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-west-1"
