name: Test Monorepo Tooling

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Don't let `mise run` auto-install tools beyond what install_args asked for.
      MISE_TASK_RUN_AUTO_INSTALL: "false"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: python
          cache_key_prefix: mise-test-tools
      - run: mise run test:tools
